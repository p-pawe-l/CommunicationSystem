name: Python Pipeline

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python-format:
    name: Python format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check lockfile
        run: uv lock --check

      - name: Check Python formatting
        run: uv run --locked --only-group dev ruff format --check scripts

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check lockfile
        run: uv lock --check

      - name: Run Ruff
        run: uv run --locked --only-group dev ruff check scripts

  python-build:
    name: Python package build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check lockfile
        run: uv lock --check

      - name: Build Python package
        run: uv build
