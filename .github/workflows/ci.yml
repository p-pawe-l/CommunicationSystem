name: CI Pipeline

on:
  workflow_run:
    workflows: [CPP Pipeline, Python Pipeline]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  gate:
    name: Wait for CPP and Python pipelines
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.pipeline-status.outputs.ready }}

    steps:
      - name: Check required pipeline status
        id: pipeline-status
        uses: actions/github-script@v7
        with:
          script: |
            const requiredPipelines = ["CPP Pipeline", "Python Pipeline"];
            const headSha = context.payload.workflow_run.head_sha;
            const event = context.payload.workflow_run.event;
            const { owner, repo } = context.repo;

            core.info(`Checking required pipelines for ${headSha}`);

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              event,
              head_sha: headSha,
              per_page: 100,
            });

            const latestRuns = new Map();
            for (const run of data.workflow_runs) {
              if (!requiredPipelines.includes(run.name)) continue;
              const current = latestRuns.get(run.name);
              if (!current || new Date(run.created_at) > new Date(current.created_at)) {
                latestRuns.set(run.name, run);
              }
            }

            const missing = requiredPipelines.filter((name) => !latestRuns.has(name));
            if (missing.length > 0) {
              core.info(`Still waiting for: ${missing.join(", ")}`);
              core.setOutput("ready", "false");
              return;
            }

            const incomplete = [...latestRuns.values()].filter((run) => run.status !== "completed");
            if (incomplete.length > 0) {
              core.info(`Still running: ${incomplete.map((run) => run.name).join(", ")}`);
              core.setOutput("ready", "false");
              return;
            }

            const failed = [...latestRuns.values()].filter((run) => run.conclusion !== "success");
            if (failed.length > 0) {
              for (const run of failed) {
                core.error(`${run.name} concluded with ${run.conclusion}`);
              }
              core.setFailed("Required pipelines are not green.");
              return;
            }

            core.info("CPP Pipeline and Python Pipeline are both green.");
            core.setOutput("ready", "true");

  shared-ci:
    name: Shared CI checks
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.ready == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C++ test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Configure CMake test build
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug

      - name: cpp-testing
        run: make cpp-test

      - name: python-testing
        run: make python-test
